<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GCF Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>GCF Student Portal</h1>
</header>

<nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('register')">Register</button>
    <button onclick="showSection('quiz')">Quiz</button>
    <button onclick="showSection('qrPage')">QR Code</button>
</nav>

<!-- HOME -->
<section id="home" class="section active">
    <h2>Welcome</h2>
    <p>Manage your profile, take quizzes, and generate QR codes.</p>
</section>

<!-- REGISTER -->
<section id="register" class="section">
    <h2>Student Registration</h2>

    <form id="studentForm">
        <input type="text" placeholder="Name" id="name" required>
        <input type="email" placeholder="Email" id="email" required>

        <select id="course">
            <option value="Web Dev">Web Development</option>
            <option value="AI">Artificial Intelligence</option>
            <option value="Data Science">Data Science</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    <p id="output"></p>
</section>

<!-- QUIZ -->
<section id="quiz" class="section">
    <h2>Quiz</h2>

    <div id="quizBox">
        <p id="question"></p>
        <div id="options"></div>
    </div>
</section>

<!-- QR -->
<section id="qrPage" class="section">
    <h2>QR Code Generator</h2>

    <input type="text" id="qrText" placeholder="Enter text">
    <button onclick="generateQR()">Generate QR</button>

    <div id="qr"></div>
</section>

<!-- QR Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>

</body>
</html>
